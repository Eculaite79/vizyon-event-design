<!-- TESTIMONIALS -->
<section class="section" id="testimonials">
  <div class="section-inner">
    <div class="testi-layout">
      <div class="testi-list" id="testiTrack">
        <div class="testimonial-card"> ... </div>
        <div class="testimonial-card"> ... </div>
        <div class="testimonial-card"> ... </div>
        <div class="testimonial-card"> ... </div>
        <div class="testimonial-card"> ... </div>
      </div>
      <div class="testi-info">
        ... 
        <div class="testi-dots" id="testiDots"></div>
      </div>
    </div>
  </div>
</section>

<script>
(function(){
  var track = document.getElementById('testiTrack');
  var dotsEl = document.getElementById('testiDots');
  if (!track || !dotsEl) return;
  var cards = track.querySelectorAll('.testimonial-card');
  if (!cards.length) return;

  var cur = 0;
  function show(n) {
    cur = (n + cards.length) % cards.length;
    cards.forEach(function(c,i){
      c.classList.remove('active','prev');
      c.style.top=''; c.style.zIndex='';
      if (i===cur) { c.classList.add('active'); c.style.top='0'; c.style.zIndex='2'; }
      else if (i===(cur+1)%cards.length) { c.classList.add('active'); c.style.top='50%'; c.style.zIndex='1'; }
    });
    dotsEl.querySelectorAll('.testi-dot').forEach(function(d,i){ d.classList.toggle('active', i===Math.floor(cur/2)); });
  }

  var pairs = Math.ceil(cards.length/2);
  for(var i=0; i<pairs; i++){
    var d=document.createElement('button');
    d.className='testi-dot'+(i===0?' active':'');
    d.setAttribute('data-i', i*2);
    d.addEventListener('click', function(){ show(+this.getAttribute('data-i')); });
    dotsEl.appendChild(d);
  }

  show(0);
  var auto=setInterval(function(){ show((cur+2)%cards.length); }, 4500);
  var testiListEl = document.querySelector('.testi-list');
  if (testiListEl) {
    testiListEl.addEventListener('mouseenter', function(){ clearInterval(auto); });
    testiListEl.addEventListener('mouseleave', function(){ auto=setInterval(function(){ show((cur+2)%cards.length); },4500); });
  }
})();
</script>
